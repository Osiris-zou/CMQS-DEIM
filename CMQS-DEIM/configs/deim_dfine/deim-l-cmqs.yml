__include__: [
  './dfine_hgnetv2_l_coco.yml',
  '../base/deim.yml'
]

output_dir: ./outputs/deim_hgnetv2_l_coco_a7_stop_10

find_unused_parameters: true

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125

epoches: 58
flat_epoch: 29
no_aug_epoch: 8

train_dataloader:
  dataset:
    transforms:
      policy:
        epoch: [4, 29, 50]

  collate_fn:
    mixup_epochs: [4, 29]
    stop_epoch: 50

DFINETransformer:
  query_select_method: cost_aware
  query_select_alpha: 1.0
  query_select_beta: 0.2
  query_select_gamma: 0.2
  query_select_use_gt: true
  query_select_gt_stop_epoch: 10

  query_select_cost_mode: sum
  query_select_stage_boundary_epoch: 15
  query_select_cls_warm: 2.0
  query_select_bbox_warm: 5.0
  query_select_giou_warm: 2.0
  query_select_cls_late: 2.0
  query_select_bbox_late: 5.0
  query_select_giou_late: 2.0

