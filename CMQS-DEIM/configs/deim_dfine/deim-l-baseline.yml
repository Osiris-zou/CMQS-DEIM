__include__: [
  './dfine_hgnetv2_l_coco.yml',
  '../base/deim.yml'
]

output_dir: ./outputs/deim_hgnetv2_l_coco_baseline

find_unused_parameters: false

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000025
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125

epoches: 58
flat_epoch: 29
no_aug_epoch: 8

train_dataloader:
  dataset:
    transforms:
      policy:
        epoch: [4, 29, 50]

  collate_fn:
    mixup_epochs: [4, 29]
    stop_epoch: 50

DFINETransformer:
  # Original DEIM-style query selection. No GT-cost guidance is used.
  query_select_method: default
